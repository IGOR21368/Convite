<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 20px;
        }

        .card {
            background: #0d0e12;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 100%;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            border: 1px solid #1f242e;
            position: relative;
        }

        .terminal-header {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            width: 100%;
            border-bottom: 1px solid #1f242e;
            padding-bottom: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.r { background-color: #ff5f56; }
        .dot.y { background-color: #ffbd2e; }
        .dot.g { background-color: #27c93f; }

        .console {
            color: #00ff66;
            font-size: 13px;
            line-height: 1.6;
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
        }

        .linha {
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .barra-progresso {
            width: 100%;
            background-color: #1a1d24;
            height: 12px;
            border-radius: 6px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }

        .progresso {
            width: 0%;
            height: 100%;
            background-color: #00ff66;
            transition: width 0.1s linear;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #00ff66;
            border-radius: 8px;
            cursor: pointer;
            background-color: transparent;
            color: #00ff66;
            margin-top: 15px;
            display: none;
            transition: all 0.2s ease;
        }

        button:active {
            background-color: #00ff66;
            color: #0d0e12;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="terminal-header">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
        </div>
        
        <div class="console" id="logConsole">
            <div class="linha">> Inicializando protocolo de varredura...</div>
        </div>

        <div class="barra-progresso" id="barraContainer">
            <div class="progresso" id="barraFill"></div>
        </div>

        <button id="btnSair" onclick="document.body.innerHTML='<h1 style=\'font-family:sans-serif;text-align:center;margin-top:40vh;color:#777;\'>Terminal Encerrado.</h1>';">FECHAR CONEXÃO</button>
    </div>

    <script>
        const consoleElem = document.getElementById("logConsole");
        const barraContainer = document.getElementById("barraContainer");
        const barraFill = document.getElementById("barraFill");
        const btnSair = document.getElementById("btnSair");

        // Detecção real do ambiente do hardware da pessoa
        const nCores = navigator.hardwareConcurrency || "N/A";
        const ramEst = navigator.deviceMemory || "N/A";
        
        const userAgent = navigator.userAgent;
        let sistemaOperacional = "Mobile Device";
        if (userAgent.match(/Android/i)) sistemaOperacional = "Android Subsystem";
        else if (userAgent.match(/iPhone|iPad|iPod/i)) sistemaOperacional = "iOS Kernel";
        else if (userAgent.match(/Windows/i)) sistemaOperacional = "Windows NT Core";

        const scriptsLogs = [
            { texto: "> Conectando ao proxy de rede mascarado...", tempo: 600 },
            { texto: "> Estabelecendo handshake seguro...", tempo: 1200 },
            { texto: `> Host identificado: [${sistemaOperacional}]`, tempo: 1800 },
            { texto: `> Cores de Processamento ativos: ${nCores} Threads`, tempo: 2400 },
            { texto: `> Arquitetura de Memória: ~${ramEst}GB RAM alocados`, tempo: 3000 },
            { texto: "> Injetando payload de leitura na memória volatil...", tempo: 3600 },
            { texto: "> Executando descriptografia de pacotes RSA-1024...", tempo: 4200 },
            { texto: "> Sincronizando logs com o servidor central...", tempo: 4800 }
        ];

        scriptsLogs.forEach((log) => {
            setTimeout(() => {
                const novaLinha = document.createElement("div");
                novaLinha.className = "linha";
                novaLinha.innerText = log.texto;
                consoleElem.appendChild(novaLinha);
            }, log.tempo);
        });

        setTimeout(() => {
            barraContainer.style.display = "block";
            let porcentagem = 0;
            
            const intervaloProgresso = setInterval(() => {
                porcentagem++;
                barraFill.style.width = porcentagem + "%";
                
                if (porcentagem >= 100) {
                    clearInterval(intervaloProgresso);
                    exibirConclusao();
                }
            }, 30);
        }, 5100);

        function exibirConclusao() {
            const finalLinha = document.createElement("div");
            finalLinha.className = "linha";
            finalLinha.style.color = "#ffffff";
            finalLinha.style.fontWeight = "bold";
            finalLinha.style.marginTop = "15px";
            finalLinha.innerText = "\n[SUCESSO] OPERAÇÃO CONCLUÍDA.\nSTATUS: TERMINAL LOCKDOWN.";
            consoleElem.appendChild(finalLinha);
            
            btnSair.style.display = "block";
        }
    </script>

</body>
</html>
