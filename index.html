<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000; /* Fundo Geral Preto Puro */
            padding: 20px;
        }

        .card {
            background: #0d0e12; /* Cinza Grafite Escuro */
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            max-width: 420px;
            width: 100%;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            border: 1px solid #1f242e;
        }

        .terminal-header {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            width: 100%;
            border-bottom: 1px solid #1f242e;
            padding-bottom: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.r { background-color: #ff5f56; }
        .dot.y { background-color: #ffbd2e; }
        .dot.g { background-color: #27c93f; }

        .console {
            font-size: 13px;
            line-height: 1.6;
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
        }

        .linha {
            margin-bottom: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #d1d5db; /* Cor padrão cinza claro */
        }

        /* Classes de Cores do Protótipo */
        .c-verde { color: #00ff66; font-weight: bold; }
        .c-ciano { color: #00f0ff; font-weight: bold; }
        .c-alerta { color: #ff5555; font-weight: bold; }
        .c-branco { color: #ffffff; }

        .barra-progresso {
            width: 100%;
            background-color: #161920;
            height: 10px;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
            border: 1px solid #1f242e;
        }

        .progresso {
            width: 0%;
            height: 100%;
            background-color: #00ff66;
            transition: width 0.1s linear;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #ff5555;
            border-radius: 8px;
            cursor: pointer;
            background-color: transparent;
            color: #ff5555;
            margin-top: 20px;
            display: none;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        button:active {
            background-color: #ff5555;
            color: #0d0e12;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="terminal-header">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
        </div>
        
        <div class="console" id="logConsole">
            <div class="linha"><span class="c-ciano">[SYS]</span> Inicializando terminal raiz...</div>
        </div>

        <div class="barra-progresso" id="barraContainer">
            <div class="progresso" id="barraFill"></div>
        </div>

        <button id="btnSair" onclick="document.body.innerHTML='<h1 style=\'font-family:monospace;text-align:center;margin-top:45vh;color:#ff5555;\'>CONEXÃO ENCERRADA.</h1>';">FECHAR TERMINAL</button>
    </div>

    <script>
        const consoleElem = document.getElementById("logConsole");
        const barraContainer = document.getElementById("barraContainer");
        const barraFill = document.getElementById("barraFill");
        const btnSair = document.getElementById("btnSair");

        const nCores = navigator.hardwareConcurrency || "4";
        const ramEst = navigator.deviceMemory || "4";
        
        const userAgent = navigator.userAgent;
        let osKernel = "LINUX_CORE";
        if (userAgent.match(/Android/i)) osKernel = "ANDROID_KERNEL";
        else if (userAgent.match(/iPhone|iPad|iPod/i)) osKernel = "DARWIN_IOS_CORE";
        else if (userAgent.match(/Windows/i)) osKernel = "WIN_NT_6.3";

        // Linhas com jargões reais de segurança e camuflagem
        const scriptsLogs = [
            { html: '<span class="c-verde">[OK]</span> Conectando ao cluster de proxies ocultos...', tempo: 600 },
            { html: '<span class="c-verde">[OK]</span> Handshake criptográfico SSL/TLS estabelecido.', tempo: 1200 },
            { html: `<span class="c-ciano">[SYS]</span> Alvo mapeado: <span class="c-branco">${osKernel}</span>`, tempo: 1800 },
            { html: `<span class="c-ciano">[SYS]</span> Hardware do host: <span class="c-branco">${nCores} Threads // ${ramEst}GB RAM</span>`, tempo: 2400 },
            { html: '<span class="c-alerta">[ATTACK]</span> Executando varredura de portas TCP via SYN Flood...', tempo: 3000 },
            { html: '<span class="c-alerta">[ATTACK]</span> Injetando shellcode binário estolado na memória...', tempo: 3600 },
            { html: '<span class="c-verde">[OK]</span> Quebra de hash MD5 concluída com sucesso.', tempo: 4200 },
            { html: '<span class="c-ciano">[SYS]</span> Executando bypass estrutural no Firewall de borda...', tempo: 4800 }
        ];

        scriptsLogs.forEach((log) => {
            setTimeout(() => {
                const novaLinha = document.createElement("div");
                novaLinha.className = "linha";
                novaLinha.innerHTML = log.html;
                consoleElem.appendChild(novaLinha);
            }, log.tempo);
        });

        setTimeout(() => {
            barraContainer.style.display = "block";
            let porcentagem = 0;
            
            const intervaloProgresso = setInterval(() => {
                porcentagem++;
                barraFill.style.width = porcentagem + "%";
                
                if (porcentagem >= 100) {
                    clearInterval(intervaloProgresso);
                    exibirConclusao();
                }
            }, 25);
        }, 5100);

        function exibirConclusao() {
            const finalLinha = document.createElement("div");
            finalLinha.className = "linha";
            finalLinha.style.marginTop = "15px";
            finalLinha.innerHTML = '<span class="c-verde">[SUCCESS] SCRIPT EXECUTADO COM SUCESSO.</span>\n<span class="c-branco">STATUS INTERNO: LOCKDOWN COMPLETO.</span>';
            consoleElem.appendChild(finalLinha);
            
            btnSair.style.display = "block";
        }
    </script>

</body>
</html>
