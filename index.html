<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 400px;
            width: 100%;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #777777;
            margin-bottom: 30px;
            transition: color 0.2s ease;
        }

        p.erro-sistema {
            color: #dc3545;
            font-weight: bold;
        }

        .input-nome {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            margin-bottom: 10px;
            text-align: center;
        }

        .msg-validacao {
            color: #dc3545;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 15px;
            display: none;
        }

        .container-botoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .container-botoes.lado-a-lado {
            flex-direction: row;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            background-color: #ffffff;
            color: #000000;
            transition: all 0.2s ease;
        }

        .btn-principal {
            background-color: #d4a373;
            color: white;
            border: none;
            font-weight: bold;
        }

        .btn-nao-fuga {
            background-color: #f0f0f0;
            color: #333333;
            border: none;
            width: auto;
            padding: 12px 30px;
        }

        .btn-sim-fuga {
            background-color: #d4a373;
            color: white;
            border: none;
            width: auto;
            padding: 12px 30px;
            font-weight: bold;
        }

        .link-direct {
            color: #d4a373;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
            margin-top: 15px;
            display: inline-block;
        }

        .img-meme {
            width: 160px;
            height: auto;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="card" id="interfaceCard">
        <!-- Tela Inicial: Identificação -->
        <h2>Antes de começar...</h2>
        <input type="text" id="nomeUsuario" class="input-nome" placeholder="Digite seu nome">
        <div id="msgValidacao" class="msg-validacao">Somente letras são permitidas</div>
        <div class="container-botoes">
            <button class="btn-principal" onclick="iniciarQuiz()">Começar</button>
        </div>
    </div>

    <script>
        let nomeSalvo = "";
        let faseAtual = 0; 
        let cliquesNoNao = 0;

        const mensagensNao = [
            "Acho que você clicou sem saber",
            "Tem certeza? Dá uma olhada de novo",
            "Dica: a resposta correta é a outra!",
            "Erro 404: opção inválida.",
            "O sistema insiste que você escolha a resposta correta"
        ];

        function iniciarQuiz() {
            const input = document.getElementById('nomeUsuario');
            const msgValidacao = document.getElementById('msgValidacao');
            const textoNome = input.value.trim();

            const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

            if (textoNome === "") {
                msgValidacao.innerText = "Por favor, digite seu nome para começar!";
                msgValidacao.style.display = "block";
                return;
            }

            if (!apenasLetras.test(textoNome)) {
                msgValidacao.innerText = "Somente letras são permitidas";
                msgValidacao.style.display = "block";
                return;
            }

            msgValidacao.style.display = "none";
            nomeSalvo = textoNome;
            faseAtual = 1; 
            atualizarTela();
        }

        function proximaFase() {
            faseAtual++;
            atualizarTela();
        }

        function atualizarTela() {
            const card = document.getElementById('interfaceCard');
            
            if (faseAtual === 1) {
                card.innerHTML = `
                    <h2>Cinema ou Parque?</h2>
                    <div class="container-botoes">
                        <button onclick="proximaFase()">Cinema</button>
                        <button onclick="proximaFase()">Parque</button>
                    </div>
                `;
            } else if (faseAtual === 2) {
                card.innerHTML = `
                    <h2>Filme ou Série?</h2>
                    <div class="container-botoes">
                        <button onclick="proximaFase()">Filme</button>
                        <button onclick="proximaFase()">Série</button>
                    </div>
                `;
            } else if (faseAtual === 3) {
                card.innerHTML = `
                    <h2>Doce ou Salgado?</h2>
                    <div class="container-botoes">
                        <button onclick="proximaFase()">Doce</button>
                        <button onclick="proximaFase()">Salgado</button>
                    </div>
                `;
            } else if (faseAtual === 4) {
                card.innerHTML = `
                    <h2>Parece que combinamos mais do que parece 🙄</h2>
                    <p id="msgSub">Você quer sair comigo?</p>
                    <div class="container-botoes lado-a-lado">
                        <button class="btn-sim-fuga" onclick="telaVitoria()">Sim</button>
                        <button class="btn-nao-fuga" id="btnNao" onclick="processarNao()">Não</button>
                    </div>
                `;
            }
        }

        function processarNao() {
            cliquesNoNao++;
            const msgSub = document.getElementById('msgSub');
            const btnNao = document.getElementById('btnNao');

            if (cliquesNoNao <= 5) {
                msgSub.innerText = mensagensNao[cliquesNoNao - 1];
                msgSub.className = "erro-sistema";
            }

            if (cliquesNoNao === 6) {
                btnNao.style.display = 'none';
                msgSub.innerText = "Opção 'Não' desativada pelo sistema.";
            }
        }

        function telaVitoria() {
            const card = document.getElementById('interfaceCard');
            card.innerHTML = `
                <h2>Vamos marcar nosso encontro! 😏</h2>
                <a href="https://instagram.com" target="_blank" class="link-direct">Me chama no direct</a>
                <div style="margin-top: 20px; font-size: 20px; font-weight: bold; color: #1a1a1a;">oii, ${nomeSalvo}</div>
                <img src="https://imgur.com" class="img-meme" alt="Emoji com Rosa">
            `;
        }
    </script>

</body>
</html>
