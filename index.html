<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Retro Runner - Funcionamento Garantido</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Janela do Jogo */
        #game-container {
            width: 100%;
            max-width: 800px;
            height: 400px;
            background: linear-gradient(to bottom, #2259ec 0%, #4da3ff 60%, #aed5ff 100%);
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Nuvens e Cenário de Fundo */
        .sky-scenery {
            position: absolute;
            top: 40px;
            width: 200%;
            height: 60px;
            background: radial-gradient(circle at 20% 50%, #ffffff 20px, transparent 21%),
                        radial-gradient(circle at 25% 60%, #ffffff 30px, transparent 31%),
                        radial-gradient(circle at 70% 50%, #ffffff 20px, transparent 21%),
                        radial-gradient(circle at 75% 60%, #ffffff 30px, transparent 31%);
            background-size: 400px 60px;
            animation: scrollBackdrop 25s linear infinite;
            animation-play-state: paused;
            opacity: 0.5;
        }

        /* Montanhas ao Fundo */
        .mountains {
            position: absolute;
            bottom: 80px;
            width: 200%;
            height: 80px;
            background: repeating-linear-gradient(90deg, transparent, transparent 50px, #2d7d32 50px, #2d7d32 150px, transparent 150px, transparent 200px);
            clip-path: polygon(0% 100%, 10% 30%, 25% 100%, 35% 20%, 50% 100%, 60% 30%, 75% 100%, 85% 20%, 100% 100%);
            animation: scrollBackdrop 15s linear infinite;
            animation-play-state: paused;
            opacity: 0.7;
        }

        /* Chão Quadriculado e Grama da Green Hill Zone */
        #floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 80px;
            background-color: #d86800;
            background-image: 
                linear-gradient(45deg, #983800 25%, transparent 25%, transparent 75%, #983800 75%),
                linear-gradient(45deg, #983800 25%, transparent 25%, transparent 75%, #983800 75%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            border-top: 10px solid #00d000;
            box-shadow: inset 0 6px 0 #007800;
            animation: scrollFloor 1.5s linear infinite;
            animation-play-state: paused;
        }

        /* Interface do Placar (HUD) */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffe600;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 10;
            line-height: 1.5;
        }
        .hud-val { color: #fff; }

        /* Sonic Desenvolvido em CSS */
        #sonic {
            width: 50px;
            height: 60px;
            position: absolute;
            bottom: 80px;
            left: 80px;
            background-color: #0033cc;
            border-radius: 12px 30px 15px 12px;
            box-shadow: 
                inset -6px -4px 0 #001aa3,
                -8px 4px 0 #0033cc, /* Espinhos traseiros */
                -12px 14px 0 #0033cc,
                -4px 44px 0 #e60000, /* Tênis Vermelho Clássico */
                4px 44px 0 #e60000;
            z-index: 5;
        }
        /* Rosto e Olho do Sonic */
        #sonic::before {
            content: '';
            position: absolute;
            top: 8px; right: -2px;
            width: 22px; height: 22px;
            background: #ffcc99;
            border-radius: 50% 50% 0 50%;
        }
        #sonic::after {
            content: '';
            position: absolute;
            top: 12px; right: 4px;
            width: 6px; height: 12px;
            background: #000;
            border-radius: 40%;
            box-shadow: -4px -2px 0 #fff;
        }

        /* Estilo Dinâmico para quando o Sonic vira uma Bola Giratória */
        #sonic.spinning {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: repeating-conic-gradient(#0033cc 0% 25%, #001aa3 25% 50%, #4da3ff 50% 75%, #0033cc 75% 100%);
            box-shadow: 0 0 12px #0033cc;
            animation: spinBall 0.15s linear infinite;
        }
        #sonic.spinning::before, #sonic.spinning::after { display: none; }

        /* Inimigo Motobug (Robô Joaninha Mecânica) */
        #enemy {
            width: 48px;
            height: 40px;
            position: absolute;
            bottom: 80px;
            right: -60px;
            background-color: #e60000;
            border-radius: 24px 24px 8px 8px;
            box-shadow: inset -6px -4px 0 #990000,
                        -6px 26px 0 #333, /* Rodinha preta inferior */
                        6px 26px 0 #333;
            z-index: 5;
        }
        /* Olho mecânico e pinças do robô */
        #enemy::before {
            content: '';
            position: absolute;
            top: 12px; left: -6px;
            width: 14px; height: 8px;
            background: #ffcc00;
            border-radius: 4px;
        }

        /* Argola Dourada Clássica */
        #ring-item {
            width: 24px;
            height: 24px;
            position: absolute;
            bottom: 170px;
            right: -100px;
            border: 5px solid #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffea00, inset 0 0 6px #ffea00;
            z-index: 4;
            animation: ringFloat 0.5s ease-in-out infinite alternate;
        }

        /* Tela de Interface Inicial / Fim */
        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 20;
        }
        #screen-overlay h1 {
            color: #ff3300;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 3px 3px #000;
            letter-spacing: 2px;
        }
        #screen-overlay p {
            font-size: 18px;
            background: #ffcc00;
            color: #000;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #b38f00;
        }

        /* Mecânicas de Animação */
        @keyframes scrollBackdrop {
            from { background-position-x: 0; }
            to { background-position-x: -400px; }
        }

        @keyframes scrollFloor {
            from { background-position-x: 0; }
            to { background-position-x: -40px; }
        }

        @keyframes spinBall {
            100% { transform: rotate(-360deg); }
        }

        @keyframes ringFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        .jumping {
            animation: jumpArc 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes jumpArc {
            0% { bottom: 80px; }
            50% { bottom: 230px; }
            100% { bottom: 80px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">

            RINGS <span id="rings-val" class="hud-val">0</span>
        </div>

        <div class="sky-scenery"></div>
        <div class="mountains"></div>
        <div id="floor"></div>

        <div id="sonic"></div>
        <div id="enemy"></div>
        <div id="ring-item"></div>

        <div id="screen-overlay">
            <h1 id="title-msg">SONIC RUNNER</h1>
            <p id="action-btn" onclick="startGame()">CLIQUE PARA JOGAR</p>
        </div>
    </div>

        container.addEventListener('touchstart', (e) => { e.preventDefault(); triggerJump(); });
