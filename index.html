<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mainframe Console</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }

        /* Grade Principal que organiza as abas idênticas à imagem */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 460px; /* Otimizado para telas de smartphones */
            max-height: 95vh;
        }

        /* Estrutura de cada Aba Visual */
        .window {
            background-color: #000000;
            border: 1px solid #00ff66;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);
            transition: opacity 1.5s ease, transform 1.5s ease, filter 1.5s ease;
            height: 190px;
        }

        /* Classe injetada pelo JavaScript para fazer a aba "derreter/deletar" */
        .window.dissolve {
            opacity: 0;
            filter: blur(10px) contrast(0);
            transform: scale(0.9) translateY(20px);
            pointer-events: none;
        }

        .window-header {
            background-color: #000000;
            border-bottom: 1px solid rgba(0, 255, 102, 0.3);
            padding: 6px 10px;
            font-size: 11px;
            font-weight: bold;
            color: #00ff66;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .window-content {
            padding: 8px;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Estilo da Aba de Texto Fluido em Alta Velocidade */
        .text-stream {
            width: 100%;
            height: 100%;
            overflow-y: hidden;
            font-size: 9px;
            line-height: 1.3;
            color: #00ff66;
            text-align: left;
        }

        /* Barra de Progresso no Rodapé */
        .footer-system {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #000000;
            border: 1px solid #00ff66;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #00ff66;
            box-shadow: 0 0 10px #00ff66;
        }

        .status-text {
            color: #00ff66;
            font-size: 10px;
            text-align: center;
            text-transform: uppercase;
        }

        .victory-screen {
            display: none;
            position: fixed;
            color: #00ff66;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="dashboard" id="mainGrid">
        <!-- ABA 1: CONSOLE DE CÓDIGO PARALELO (FLUIDO) -->
        <div class="window" id="w1">
            <div class="window-header">Program Console</div>
            <div class="window-content">
                <div class="text-stream" id="consoleStream"></div>
            </div>
        </div>

        <!-- ABA 2: RENDERIZAÇÃO NEURAL DINÂMICA (CANVAS) -->
        <div class="window" id="w2">
            <div class="window-header">Neural Network</div>
            <div class="window-content">
                <canvas id="neuralCanvas" style="width:100%; height:100%;"></canvas>
            </div>
        </div>

        <!-- ABA 3: GRÁFICO ESTÁTICO DE ALTA FIDELIDADE (SENÓIDE) -->
        <div class="window" id="w3">
            <div class="window-header">System Analytics</div>
            <div class="window-content">
                <canvas id="vectorCanvas" style="width:100%; height:100%;"></canvas>
            </div>
        </div>

        <!-- ABA 4: OPERAÇÕES DO ANDROID KERNEL -->
        <div class="window" id="w4">
            <div class="window-header">Android Subsystem</div>
            <div class="window-content">
                <div class="text-stream" id="androidStream"></div>
            </div>
        </div>

        <!-- BARRA DE CARREGAMENTO DO SISTEMA PRINCIPAL -->
        <div class="footer-system" id="footerBar">
            <div class="progress-bar">
                <div class="progress-fill" id="mainProgress"></div>
            </div>
            <div class="status-text" id="statusMessage">Executing global core deployment...</div>
        </div>
    </div>

    <div class="victory-screen" id="victoryMsg">
        [SUCCESS] MAINFRAME COLD LOCKDOWN COMPLETED.<br>
        ALL ENVIRONMENT TRACES SUCCESSFULLY PURGED.
    </div>

    <script>
        // DADOS TÉCNICOS PARA AS ABAS DE FLUXO DE TEXTO
        const codePhrases = [
            "get: function() { return d(f), e },",
            "set: function(a) { d(f), e = a },",
            "_.definePropertyBroken = 10, b[c] = e",
            "a.migrateVersion = '1.4.1'; var f = {};",
            "sys.allocate_virtual_blocks(0x7FFF);",
            "kernel.bypass_boundary_firewall(true);",
            "network.syn_flood_port_scan(active);",
            "crypto.decrypt_rsa_key_distribution();",
            "android.inject_payload_stack_trace();",
            "hardware.profiling_active_threads(8);"
        ];

        const androidPhrases = [
            "[INFO] Target environment identified: [ARM64_ANDROID_KERNEL]",
            "[SYS] Resolving dalvik.system.DexClassLoader native pointer...",
            "[OK] Successfully bypassed Android SELinux strict enforcement.",
            "[ATTACK] Overwriting memory sectors in volatile system stack...",
            "[SYS] Core thread allocation: 8 logical threads fully operational.",
            "[OK] Security trace traces purged from global runtime logs.",
            "[INFO] Memory allocation vector stable at ~4GB virtual layout.",
            "[SUCCESS] Android sub-runtime hooked into secure loop handler."
        ];

        // CONFIGURAÇÃO DA ABA 1 E ABA 4 (FLUXO DE TEXTO SIMULTÂNEO)
        const consoleElem = document.getElementById("consoleStream");
        const androidElem = document.getElementById("androidStream");

        setInterval(() => {
            const randCode = codePhrases[Math.floor(Math.random() * codePhrases.length)];
            consoleElem.innerHTML += randCode + "<br>";
            if (consoleElem.innerHTML.split("<br>").length > 13) {
                consoleElem.innerHTML = consoleElem.innerHTML.split("<br>").slice(1).join("<br>");
            }
        }, 150); // Velocidade do console de código

        setInterval(() => {
            const randAndroid = androidPhrases[Math.floor(Math.random() * androidPhrases.length)];
            androidElem.innerHTML += randAndroid + "<br>";
            if (androidElem.innerHTML.split("<br>").length > 13) {
                androidElem.innerHTML = androidElem.innerHTML.split("<br>").slice(1).join("<br>");
            }
        }, 220); // Velocidade do console Android

        // CONFIGURAÇÃO DA ABA 2 (REDE NEURAL EM TEMPO REAL VIA CANVAS)
        const nCanvas = document.getElementById("neuralCanvas");
        const nCtx = nCanvas.getContext("2d");
        nCanvas.width = 180;
        nCanvas.height = 150;

        let nodes = [];
        for (let i = 0; i < 12; i++) {
            nodes.push({
                x: Math.random() * nCanvas.width,
                y: Math.random() * nCanvas.height,
                vx: (Math.random() - 0.5) * 1.2,
                vy: (Math.random() - 0.5) * 1.2
            });
        }

        function drawNeuralNetwork() {
            nCtx.clearRect(0, 0, nCanvas.width, nCanvas.height);
            nCtx.fillStyle = "#00ff66";
            nCtx.strokeStyle = "rgba(0, 255, 102, 0.15)";
            nCtx.lineWidth = 1;

            nodes.forEach(node => {
                node.x += node.vx;
                node.y += node.vy;

                if (node.x < 0 || node.x > nCanvas.width) node.vx = -node.vx;
                if (node.y < 0 || node.y > nCanvas.height) node.vy = -node.vy;

                nCtx.beginPath();
                nCtx.arc(node.x, node.y, 2, 0, Math.PI * 2);
                nCtx.fill();
            });

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                    if (dist < 45) {
                        nCtx.beginPath();
                        nCtx.moveTo(nodes[i].x, nodes[i].y);
                        nCtx.lineTo(nodes[j].x, nodes[j].y);
                        nCtx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawNeuralNetwork);
        }
        drawNeuralNetwork();

        // CONFIGURAÇÃO DA ABA 3 (GRÁFICO SENOIDAL ESTÁTICO DE ALTA FIDELIDADE)

        const vCtx = vCanvas.getContext("2d");
        vCanvas.width = 180;
