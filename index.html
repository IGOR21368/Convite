<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Retro Runner - Versão Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Janela do Jogo com Proporção de Arcade */
        #game-container {
            width: 100%;
            max-width: 800px;
            height: 400px;
            background-color: #2058c0;
            /* Fundo oficial com montanhas e nuvens da Green Hill Zone */
            background-image: url('https://squarespace-cdn.com');
            background-size: auto 100%;
            background-repeat: repeat-x;
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: scrollBackdrop 15s linear infinite;
            animation-play-state: paused;
        }

        /* Chão de Terra Quadriculada Original da SEGA */
        #floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 80px;
            background-image: url('https://githubusercontent.com');
            background-size: auto 100%;
            background-repeat: repeat-x;
            animation: scrollFloor 2s linear infinite;
            animation-play-state: paused;
        }

        /* Interface de Placar (HUD) */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #f8b800;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 10;
            line-height: 1.5;
        }
        .hud-val { color: #fff; }

        /* Sprite Real do Sonic Correndo */
        #sonic {
            width: 64px;
            height: 64px;
            position: absolute;
            bottom: 72px;
            left: 80px;
            background-image: url('https://githubusercontent.com');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
        }

        /* Sprite Real do Inimigo Motobug */
        #enemy {
            width: 55px;
            height: 45px;
            position: absolute;
            bottom: 75px;
            right: -60px;
            background-image: url('https://githubusercontent.com');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 5;
        }

        /* Sprite da Argola Dourada Girando */
        #ring-item {
            width: 28px;
            height: 28px;
            position: absolute;
            bottom: 170px;
            right: -100px;
            background-image: url('https://githubusercontent.com');
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 4;
        }

        /* Tela de Início / Game Over */
        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 20;
        }
        #screen-overlay h1 {
            color: #f83000;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 3px 3px #000;
            letter-spacing: 2px;
        }
        #screen-overlay p {
            font-size: 18px;
            background: #f8b800;
            color: #000;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #bc8a00;
            transition: transform 0.1s;
        }
        #screen-overlay p:active {
            transform: scale(0.95);
        }

        /* Animações de Movimento e Física */
        @keyframes scrollBackdrop {
            from { background-position: 0 0; }
            to { background-position: -800px 0; }
        }

        @keyframes scrollFloor {
            from { background-position: 0 0; }
            to { background-position: -400px 0; }
        }

        .jumping {
            animation: jumpArc 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes jumpArc {
            0% { bottom: 72px; }
            50% { bottom: 240px; }
            100% { bottom: 72px; }
        }
    </style>
</head>
<body>

        <div id="hud">

            RINGS <span id="rings-val" class="hud-val">0</span>
        </div>

        <div id="floor"></div>

        <div id="sonic"></div>
        <div id="enemy"></div>
        <div id="ring-item"></div>

        <div id="screen-overlay">
            <h1 id="title-msg">SONIC RUNNER</h1>
            <p id="action-btn" onclick="startGame()">CLIQUE PARA JOGAR</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');

        container.addEventListener('touchstart', (e) => { e.preventDefault(); triggerJump(); });
        container.addEventListener('mousedown', triggerJump);

        function triggerJump() {
            if (!isPlaying || isJumping) return;
            isJumping = true;
            
            // Altera para a imagem do Sonic em formato de bola giratória
            sonic.style.backgroundImage = "url('https://githubusercontent.com')";
            sonic.classList.add('jumping');
            
            setTimeout(() => {
                sonic.classList.remove('jumping');
                // Retorna para a animação do Sonic correndo normalmente ao pisar no chão
                if (isPlaying) {
                    sonic.style.backgroundImage = "url('https://githubusercontent.com')";
                }
                isJumping = false;
            }, 650);
        }

        function startGame() {
            score = 0;
            rings = 0;
            gameSpeed = 6;
            enemyX = 850;
            ringX = 1100;
            
            scoreVal.innerText = score;
            ringsVal.innerText = rings;
            
            enemy.style.display = 'block';
            ringItem.style.display = 'block';
            sonic.style.backgroundImage = "url('https://githubusercontent.com')";
            
            overlay.style.display = 'none';
            container.style.animationPlayState = 'running';
            floor.style.animationPlayState = 'running';
            isPlaying = true;

            // Inicia o motor de física do jogo
            gameLoopInterval = setInterval(gameLoop, 10);
        }

            enemyX -= gameSpeed;
            ringX -= gameSpeed;

            // Reposiciona o Motobug se ele sair da tela
            if (enemyX < -60) {
                enemyX = 850 + Math.random() * 400;
                enemy.style.display = 'block';
                score += 100;
                scoreVal.innerText = score;

            }
