<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 400px;
            width: 100%;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: #777777;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-nome {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            margin-bottom: 5px;
            text-align: center;
        }

        .input-nome:focus {
            border-color: #d4a373;
        }

        .msg-validacao {
            color: #dc3545;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            height: 18px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-principal {
            background-color: #d4a373;
            color: white;
        }

        .btn-reiniciar {
            background-color: #1a1a1a;
            color: white;
            margin-top: 20px;
            max-width: 200px;
        }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 240px;
            height: 240px;
        }

        .celula {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
        }

        .celula.xis { color: #d4a373; }
        .celula.bola { color: #6c757d; }

        .texto-resultado {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .texto-resultado.vermelho { color: #dc3545; }
        .texto-resultado.sucesso { color: #1a1a1a; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <p>Insira seu nome para enfrentar o sistema de defesa.</p>
        <input type="text" id="nomeJogador" class="input-nome" placeholder="Digite seu nome" maxlength="15">
        <div id="msgValidacao" class="msg-validacao">Somente letras são permitidas</div>
        <button class="btn-principal" onclick="validarEIniciar()">Iniciar Partida</button>
    </div>

    <script>
        let nomeSalvo = "";
        let t = ["", "", "", "", "", "", "", "", ""];
        let jogoAtivo = true;

        function validarEIniciar() {
            const input = document.getElementById('nomeJogador');
            const msg = document.getElementById('msgValidacao');
            const texto = input.value.trim();
            const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

            if (texto === "") {
                msg.innerText = "Por favor, digite seu nome!";
                msg.style.display = "block";
                return;
            }

            if (!apenasLetras.test(texto)) {
                msg.innerText = "Somente letras são permitidas";
                msg.style.display = "block";
                return;
            }

            msg.style.display = "none";
            nomeSalvo = texto;
            montarTabuleiro();
        }

        function montarTabuleiro() {
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <h2>Sua vez, ${nomeSalvo} (X)</h2>
                <p>Alinhe três símbolos para vencer o IGOR.</p>
                <div class="tabuleiro">
                    <div class="celula" onclick="jogada(0)" id="c0"></div>
                    <div class="celula" onclick="jogada(1)" id="c1"></div>
                    <div class="celula" onclick="jogada(2)" id="c2"></div>
                    <div class="celula" onclick="jogada(3)" id="c3"></div>
                    <div class="celula" onclick="jogada(4)" id="c4"></div>
                    <div class="celula" onclick="jogada(5)" id="c5"></div>
                    <div class="celula" onclick="jogada(6)" id="c6"></div>
                    <div class="celula" onclick="jogada(7)" id="c7"></div>
                    <div class="celula" onclick="jogada(8)" id="c8"></div>
                </div>
            `;
        }

        function jogada(index) {
            if (t[index] !== "" || !jogoAtivo) return;

            t[index] = "X";
            document.getElementById(`c${index}`).innerText = "X";
            document.getElementById(`c${index}`).classList.add('xis');

            if (checarVitoria("X")) {
                concluirJogo("vitoria");
                return;
            }

            if (!t.includes("")) {
                concluirJogo("empate");
                return;
            }

            jogoAtivo = false;
            setTimeout(jogadaBot, 350);
        }

        function jogadaBot() {
            let escolha = -1;

            // 1. Tentar vencer ou bloquear por varredura direta e por extenso
            escolha = testarLinhagem("O"); // Inteligência busca vencer
            if (escolha === -1) escolha = testarLinhagem("X"); // Inteligência busca bloquear você

            // 2. Se não houver risco imediato, pega o centro
            if (escolha === -1 && t[4] === "") escolha = 4;

            // 3. Se o centro estiver ocupado, joga em qualquer canto vazio
            if (escolha === -1) {
                let cantos =;
                let disponiveis = cantos.filter(i => t[i] === "");
                if (disponiveis.length > 0) {
                    escolha = disponiveis[Math.floor(Math.random() * disponiveis.length)];
                }
            }

            // 4. Último caso: joga na primeira casa livre que encontrar
            if (escolha === -1) {
                let vazios = [];
                t.forEach((v, i) => { if (v === "") vazios.push(i); });
                escolha = vazios[Math.floor(Math.random() * vazios.length)];
            }

            t[escolha] = "O";
            const elemento = document.getElementById(`c${escolha}`);
            if (elemento) {
                elemento.innerText = "O";
                elemento.classList.add('bola');
            }

            if (checarVitoria("O")) {
                concluirJogo("derrota");
                return;
            }

            if (!t.includes("")) {
                concluirJogo("empate");
                return;
            }

            jogoAtivo = true;
        }

        // Função de verificação por extenso para garantir tolerância zero a falhas
        function testarLinhagem(s) {
            // Verifica Linhas Horizontais
            if (t[0] === s && t[1] === s && t[2] === "") return 2;
            if (t[0] === s && t[2] === s && t[1] === "") return 1;
            if (t[1] === s && t[2] === s && t[0] === "") return 0;

            if (t[3] === s && t[4] === s && t[5] === "") return 5;
            if (t[3] === s && t[5] === s && t[4] === "") return 4;
            if (t[4] === s && t[5] === s && t[3] === "") return 3;

            if (t[6] === s && t[7] === s && t[8] === "") return 8;
            if (t[6] === s && t[8] === s && t[7] === "") return 7;
            if (t[7] === s && t[8] === s && t[6] === "") return 6;

            // Verifica Colunas Verticais
            if (t[0] === s && t[3] === s && t[6] === "") return 6;
            if (t[0] === s && t[6] === s && t[3] === "") return 3;
            if (t[3] === s && t[6] === s && t[0] === "") return 0;

            if (t[1] === s && t[4] === s && t[7] === "") return 7;
            if (t[1] === s && t[7] === s && t[4] === "") return 4;
            if (t[4] === s && t[7] === s && t[1] === "") return 1;

            if (t[2] === s && t[5] === s && t[8] === "") return 8;
            if (t[2] === s && t[8] === s && t[5] === "") return 5;
            if (t[5] === s && t[8] === s && t[2] === "") return 2;

            // Verifica Diagonais Cruciais
            if (t[0] === s && t[4] === s && t[8] === "") return 8;
            if (t[0] === s && t[8] === s && t[4] === "") return 4;
            if (t[4] === s && t[8] === s && t[0] === "") return 0;

            if (t[2] === s && t[4] === s && t[6] === "") return 6;
            if (t[2] === s && t[6] === s && t[4] === "") return 4;
            if (t[4] === s && t[6] === s && t[2] === "") return 2;

            return -1;
        }

        function checarVitoria(s) {
