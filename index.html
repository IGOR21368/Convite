<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ping Pong</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 15px;
            overflow: hidden;
            touch-action: none;
        }

        .card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 400px;
            width: 100%;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: #777777;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-nome {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            margin-bottom: 5px;
            text-align: center;
        }

        .input-nome:focus {
            border-color: #d4a373;
        }

        .msg-validacao {
            color: #dc3545;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            height: 18px;
            visibility: hidden;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-principal {
            background-color: #d4a373;
            color: white;
        }

        .btn-reiniciar {
            background-color: #1a1a1a;
            color: white;
            margin-top: 20px;
            max-width: 200px;
        }

        .texto-resultado {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .texto-resultado.vermelho {
            color: #dc3545;
        }

        .texto-resultado.sucesso {
            color: #1a1a1a;
        }

        canvas {
            background-color: #111111;
            border-radius: 12px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 340px;
            height: 380px;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2>Ping Pong 🏓</h2>
        <p>Insira seu nome para enfrentar o sistema de defesa.</p>
        <input type="text" id="nomeJogador" class="input-nome" placeholder="Digite seu nome" maxlength="15">
        <div id="msgValidacao" class="msg-validacao">Somente letras são permitidas</div>
        <button class="btn-principal" onclick="processarEtapaValidacao()">Iniciar Partida</button>
    </div>

    <script>
        let nomeJogadorSalvo = "";
        let canvas, ctx, animacaoId;

        const raqueteAltura = 10;
        const raqueteLargura = 70;
        const bolaRaio = 6;

        let jugadorX = 135;
        let botX = 135;
        let bolaX = 170;
        let bolaY = 190;
        let bolaVelX = 3;
        let bolaVelY = 3;

        let placarJogador = 0;
        let placarBot = 0;
        const pontosParaVencer = 3;
        let executando = false;

        // SEQUÊNCIA 1: Validação dos dados de entrada
        function processarEtapaValidacao() {
            const input = document.getElementById('nomeJogador');
            const msg = document.getElementById('msgValidacao');
            const texto = input.value.trim();
            const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

            if (texto === "") {
                msg.innerText = "Por favor, digite seu nome!";
                msg.style.visibility = "visible";
                return;
            }

            if (!apenasLetras.test(texto)) {
                msg.innerText = "Somente letras são permitidas";
                msg.style.visibility = "visible";
                return;
            }

            msg.style.visibility = "hidden";
            nomeJogadorSalvo = texto;

            // Avança para a próxima etapa na sequência
            processarEtapaConstrucaoTela();
        }

        // SEQUÊNCIA 2: Injeção da estrutura visual no navegador
        function processarEtapaConstrucaoTela() {
            const card = document.getElementById("mainCard");
            card.innerHTML = `<canvas id="pongCanvas" width="340" height="380"></canvas>`;
            
            // Pausa estratégica de 100ms para garantir que a tela foi totalmente montada pelo celular
            setTimeout(processarEtapaInicializacaoMotores, 100);
        }

        // SEQUÊNCIA 3: Vinculação de variáveis e ativação do loop físico
        function processarEtapaInicializacaoMotores() {
            canvas = document.getElementById("pongCanvas");
            if (!canvas) return; // Proteção contra falha estrutural
            
            ctx = canvas.getContext("2d");

            configurarControles();
            resetarBola();
            executando = true;
            loopJogo();
        }

        function configurarControles() {
            canvas.addEventListener("touchmove", (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touchX = e.touches.clientX - rect.left;
                const escalaX = 340 / rect.width;
                jugadorX = (touchX * escalaX) - raqueteLargura / 2;
                
                if (jugadorX < 0) jugadorX = 0;
                if (jugadorX + raqueteLargura > 340) jugadorX = 340 - raqueteLargura;
            }, { passive: false });

            canvas.addEventListener("mousemove", (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const escalaX = 340 / rect.width;
                jugadorX = (mouseX * escalaX) - raqueteLargura / 2;

                if (jugadorX < 0) jugadorX = 0;
                if (jugadorX + raqueteLargura > 340) jugadorX = 340 - raqueteLargura;
            });
        }

        function resetarBola() {
            bolaX = 170;
            bolaY = 190;
            bolaVelX = (Math.random() > 0.5 ? 3 : -3);
            bolaVelY = 3;
        }

        function atualizar() {
            if (!executando) return;

            bolaX += bolaVelX;
            bolaY += bolaVelY;

            if (bolaX - bolaRaio < 0 || bolaX + bolaRaio > 340) {
                bolaVelX = -bolaVelX;
            }

            let centroBot = botX + raqueteLargura / 2;
            if (centroBot < bolaX - 10) {
                botX += 2.8;
            } else if (centroBot > bolaX + 10) {
                botX -= 2.8;
            }

            if (botX < 0) botX = 0;
            if (botX + raqueteLargura > 340) botX = 340 - raqueteLargura;

            if (bolaY - bolaRaio <= raqueteAltura) {
                if (bolaX > botX && bolaX < botX + raqueteLargura) {
                    bolaVelY = -bolaVelY;
                    bolaY = raqueteAltura + bolaRaio;
                    bolaVelX *= 1.05;
                    bolaVelY *= 1.05;
                } else if (bolaY < 0) {
                    placarJogador++;
                    checarFimDeJogo();
                }
            }

            if (bolaY + bolaRaio >= 380 - raqueteAltura) {
                if (bolaX > jugadorX && bolaX < jugadorX + raqueteLargura) {
                    bolaVelY = -bolaVelY;
                    bolaY = 380 - raqueteAltura - bolaRaio;
                    bolaVelX *= 1.05;
                    bolaVelY *= 1.05;
                } else if (bolaY > 380) {
                    placarBot++;
                    checarFimDeJogo();
                }
            }
        }

        function desenhar() {
            if (!ctx) return;
            ctx.clearRect(0, 0, 340, 380);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 190);
            ctx.lineTo(340, 190);
            ctx.stroke();

            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(placarBot, 170, 160);
            ctx.fillText(placarJogador, 170, 250);

            ctx.fillStyle = "#333333";
            ctx.fillRect(botX, 0, raqueteLargura, raqueteAltura);

            ctx.fillStyle = "#d4a373";
            ctx.fillRect(jugadorX, 370, raqueteLargura, raqueteAltura);

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(bolaX, bolaY, bolaRaio, 0, Math.PI * 2);
            ctx.fill();
        }

        function loopJogo() {
            atualizar();
            desenhar();
            if (executando) {
                animacaoId = requestAnimationFrame(loopJogo);
            }
        }

        function checarFimDeJogo() {
            if (placarJogador >= pontosParaVencer || placarBot >= pontosParaVencer) {
                executando = false;
