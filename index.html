<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ping Pong</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 400px;
            width: 100%;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: #777777;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-nome {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            margin-bottom: 5px;
            text-align: center;
        }

        .input-nome:focus {
            border-color: #d4a373;
        }

        .msg-validacao {
            color: #dc3545;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            height: 18px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-principal {
            background-color: #d4a373;
            color: white;
        }

        .btn-reiniciar {
            background-color: #1a1a1a;
            color: white;
            margin-top: 20px;
            max-width: 200px;
        }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 240px;
            height: 240px;
        }

        .celula {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
        }

        .celula.xis { color: #d4a373; }
        .celula.bola { color: #6c757d; }

        .texto-resultado {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .texto-resultado.vermelho { color: #dc3545; }
        .texto-resultado.sucesso { color: #1a1a1a; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h2>Ping Pong 🏓</h2>
        <p>Insira seu nome para jogar.</p>
        <input type="text" id="nomeJogador" class="input-nome" placeholder="Digite seu nome" maxlength="15">
        <div id="msgValidacao" class="msg-validacao">Somente letras são permitidas</div>
        <button class="btn-principal" onclick="validarEIniciar()">Iniciar Partida</button>
    </div>

    <script>
        let nomeSalvo = "";
        let tabuleiro = ["", "", "", "", "", "", "", "", ""];
        let jogoAtivo = true;

        const padroesVitoria = [, [3, 4, 5], [6, 7, 8], // Horizontais, [1, 4, 7], [2, 5, 8], // Verticais, [2, 4, 6]             // Diagonais
        ];

        function validarEIniciar() {
            const input = document.getElementById('nomeJogador');
            const msg = document.getElementById('msgValidacao');
            const texto = input.value.trim();
            const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

            if (texto === "") {
                msg.innerText = "Por favor, digite seu nome!";
                msg.style.display = "block";
                return;
            }

            if (!apenasLetras.test(texto)) {
                msg.innerText = "Somente letras são permitidas";
                msg.style.display = "block";
                return;
            }

            msg.style.display = "none";
            nomeSalvo = texto;
            montarTabuleiro();
        }

        function montarTabuleiro() {
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <h2>Sua vez, ${nomeSalvo} (X)</h2>
                <p>Alinhe três símbolos para vencer IGOR.</p>
                <div class="tabuleiro">
                    <div class="celula" onclick="jogada(0)" id="c0"></div>
                    <div class="celula" onclick="jogada(1)" id="c1"></div>
                    <div class="celula" onclick="jogada(2)" id="c2"></div>
                    <div class="celula" onclick="jogada(3)" id="c3"></div>
                    <div class="celula" onclick="jogada(4)" id="c4"></div>
                    <div class="celula" onclick="jogada(5)" id="c5"></div>
                    <div class="celula" onclick="jogada(6)" id="c6"></div>
                    <div class="celula" onclick="jogada(7)" id="c7"></div>
                    <div class="celula" onclick="jogada(8)" id="c8"></div>
                </div>
            `;
        }

        function jogada(index) {
            if (tabuleiro[index] !== "" || !jogoAtivo) return;

            tabuleiro[index] = "X";
            document.getElementById(`c${index}`).innerText = "X";
            document.getElementById(`c${index}`).classList.add('xis');

            if (checarVitoria("X")) {
                concluirJogo("vitoria");
                return;
            }

            if (!tabuleiro.includes("")) {
                concluirJogo("empate");
                return;
            }

            jogoAtivo = false;
            setTimeout(jogadaBotInteligente, 350);
        }

        function jogadaBotInteligente() {
            let escolha = -1;

            // 1. Tentar vencer imediatamente
            escolha = buscarMelhorMovimento("O");
            
            // 2. Se não der para vencer, bloquear o jogador (X)
            if (escolha === -1) {
                escolha = buscarMelhorMovimento("X");
            }

            // 3. Dominar o centro se estiver disponível
            if (escolha === -1 && tabuleiro[4] === "") {
                escolha = 4;
            }

            // 4. Jogar em um canto vazio estrategicamente
            if (escolha === -1) {
                const cantos =;
                const cantosVazios = cantos.filter(i => tabuleiro[i] === "");
                if (cantosVazios.length > 0) {
                    escolha = cantosVazios[Math.floor(Math.random() * cantosVazios.length)];
                }
            }

            // 5. Jogar em qualquer espaço que sobrou
            if (escolha === -1) {
                let vazios = [];
                tabuleiro.forEach((v, i) => { if (v === "") vazios.push(i); });
                escolha = vazios[Math.floor(Math.random() * vazios.length)];
            }

            tabuleiro[escolha] = "O";
            const elemento = document.getElementById(`c${escolha}`);
            if (elemento) {
                elemento.innerText = "O";
                elemento.classList.add('bola');
            }

            if (checarVitoria("O")) {
                concluirJogo("derrota");
                return;
            }

            if (!tabuleiro.includes("")) {
                concluirJogo("empate");
                return;
            }

            jogoAtivo = true;
        }

        function buscarMelhorMovimento(simbolo) {
            for (let padrao of padroesVitoria) {
                const marcas = padrao.map(i => tabuleiro[i]);
                const contagemSimbolo = marcas.filter(m => m === simbolo).length;
                const contagemVazio = marcas.filter(m => m === "").length;

                if (contagemSimbolo === 2 && contagemVazio === 1) {
                    return padrao[marcas.indexOf("")];
                }
            }
            return -1;
        }

        function checarVitoria(s) {
            return padroesVitoria.some(m => m.every(i => tabuleiro[i] === s));
        }

        function concluirJogo(res) {
            const card = document.getElementById('mainCard');
            if (res === "vitoria") {
                card.innerHTML = `
                    <div class="texto-resultado sucesso">Jogou bem, but. </div>
                    <button class="btn-reiniciar" onclick="reiniciar()">Reiniciar</button>
                `;
            } else if (res === "derrota") {
                card.innerHTML = `
                    <div class="texto-resultado vermelho">PERDEU BUT 💀</div>
                    <button class="btn-reiniciar" onclick="reiniciar()">Reiniciar</button>
                `;
            } else {
                card.innerHTML = `
                    <div class="texto-resultado sucesso">Empate tático. </div>
                    <button class="btn-reiniciar" onclick="reiniciar()">Reiniciar</button>
                `;
            }
        }

        function reiniciar() {
