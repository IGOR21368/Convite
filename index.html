<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio Clássico</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 15px;
            overflow: hidden;
            touch-action: none;
        }

        .card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 400px;
            width: 100%;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: #777777;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-nome {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            margin-bottom: 5px;
            text-align: center;
            transition: border-color 0.2s ease;
        }

        .input-nome:focus {
            border-color: #d4a373;
        }

        .msg-validacao {
            color: #dc3545;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            height: 18px;
            visibility: hidden;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-principal {
            background-color: #d4a373;
            color: white;
        }

        .btn-reiniciar {
            background-color: #1a1a1a;
            color: white;
            margin-top: 20px;
            max-width: 200px;
        }

        .texto-resultado {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .texto-resultado.vermelho {
            color: #dc3545;
        }

        .texto-resultado.sucesso {
            color: #1a1a1a;
        }

        #arena {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        canvas {
            background-color: #111111;
            border-radius: 12px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 340px;
            height: 380px;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div id="telaLogin">
            <h2>Desafio de Reflexo</h2>
            <p>Insira seu nome para enfrentar o sistema de defesa.</p>
            <input type="text" id="nomeJogador" class="input-nome" placeholder="Digite seu nome" maxlength="15">
            <div id="msgValidacao" class="msg-validacao">Somente letras são permitidas</div>
            <button class="btn-principal" onclick="validarEIniciar()">Iniciar Partida</button>
        </div>

        <div id="arena">
            <canvas id="pongCanvas" width="340" height="380"></canvas>
        </div>
    </div>

    <script>
        let nomeJogadorSalvo = "";
        let canvas = document.getElementById("pongCanvas");
        let ctx = canvas.getContext("2d");
        let animacaoId;

        const raqueteAltura = 10;
        const raqueteLargura = 70;
        const bolaRaio = 6;

        let jugadorX = (340 - raqueteLargura) / 2;
        let botX = (340 - raqueteLargura) / 2;
        
        let bolaX = 170;
        let bolaY = 190;
        let bolaVelX = 3;
        let bolaVelY = 3;

        let placarJogador = 0;
        let placarBot = 0;
        const pontosParaVencer = 3;
        let executando = false;

        function validarEIniciar() {
            const input = document.getElementById('nomeJogador');
            const msg = document.getElementById('msgValidacao');
            const texto = input.value.trim();
            const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

            if (texto === "") {
                msg.innerText = "Por favor, digite seu nome!";
                msg.style.visibility = "visible";
                return;
            }

            if (!apenasLetras.test(texto)) {
                msg.innerText = "Somente letras são permitidas";
                msg.style.visibility = "visible";
                return;
            }

            msg.style.visibility = "hidden";
            nomeJogadorSalvo = texto;

            document.getElementById("telaLogin").style.display = "none";
            document.getElementById("arena").style.display = "flex";
            
            configurarControles();
            resetarBola();
            executando = true;
            loopJogo();
        }

        function configurarControles() {
            canvas.addEventListener("touchmove", (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                jugadorX = touchX - raqueteLargura / 2;
                
                if (jugadorX < 0) jugadorX = 0;
                if (jugadorX + raqueteLargura > canvas.width) jugadorX = canvas.width - raqueteLargura;
            }, { passive: false });

            canvas.addEventListener("mousemove", (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                jugadorX = mouseX - raqueteLargura / 2;

                if (jugadorX < 0) jugadorX = 0;
                if (jugadorX + raqueteLargura > canvas.width) jugadorX = canvas.width - raqueteLargura;
            });
        }

        function resetarBola() {
            bolaX = canvas.width / 2;
            bolaY = canvas.height / 2;
            bolaVelX = (Math.random() > 0.5 ? 3 : -3);
            bolaVelY = 3;
        }

        function atualizar() {
            if (!executando) return;

            bolaX += bolaVelX;
            bolaY += bolaVelY;

            if (bolaX - bolaRaio < 0 || bolaX + bolaRaio > canvas.width) {
                bolaVelX = -bolaVelX;
            }

            let centroBot = botX + raqueteLargura / 2;
            if (centroBot < bolaX - 10) {
                botX += 2.8;
            } else if (centroBot > bolaX + 10) {
                botX -= 2.8;
            }

            if (botX < 0) botX = 0;
            if (botX + raqueteLargura > canvas.width) botX = canvas.width - raqueteLargura;

            if (bolaY - bolaRaio <= raqueteAltura) {
                if (bolaX > botX && bolaX < botX + raqueteLargura) {
                    bolaVelY = -bolaVelY;
                    bolaY = raqueteAltura + bolaRaio;
                    bolaVelX *= 1.05;
                    bolaVelY *= 1.05;
                } else if (bolaY < 0) {
                    placarJogador++;
                    checarFimDeJogo();
                }
            }

            if (bolaY + bolaRaio >= canvas.height - raqueteAltura) {
                if (bolaX > jugadorX && bolaX < jugadorX + raqueteLargura) {
                    bolaVelY = -bolaVelY;
                    bolaY = canvas.height - raqueteAltura - bolaRaio;
                    bolaVelX *= 1.05;
                    bolaVelY *= 1.05;
                } else if (bolaY > canvas.height) {
                    placarBot++;
                    checarFimDeJogo();
                }
            }
        }

        function desenhar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(placarBot, canvas.width / 2, canvas.height / 2 - 30);
            ctx.fillText(placarJogador, canvas.width / 2, canvas.height / 2 + 60);

            ctx.fillStyle = "#333333";
            ctx.fillRect(botX, 0, raqueteLargura, raqueteAltura);

            ctx.fillStyle = "#d4a373";
            ctx.fillRect(jugadorX, canvas.height - raqueteAltura, raqueteLargura, raqueteAltura);

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(bolaX, bolaY, bolaRaio, 0, Math.PI * 2);
            ctx.fill();
        }

        function loopJogo() {
            atualizar();
            desenhar();
            if (executando) {
                animacaoId = requestAnimationFrame(loopJogo);
            }
        }

        function checarFimDeJogo() {
            if (placarJogador >= pontosParaVencer || placarBot >= pontosParaVencer) {
                executando = false;
                cancelAnimationFrame(animacaoId);
