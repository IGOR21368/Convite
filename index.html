<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000; /* Fundo Preto Puro */
            padding: 20px;
        }

        .card {
            background: #000000; /* Card Preto para mesclar com o fundo */
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.15); /* Sombra Verde Suave */
            max-width: 440px;
            width: 100%;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            text-align: left;
            border: 1px solid #00ff66; /* Borda Verde Neon Estilo Monitor Antigo */
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
            padding-bottom: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #00ff66; /* Todos os detalhes em verde */
            opacity: 0.4;
        }

        .console {
            font-size: 12px;
            line-height: 1.6;
            width: 100%;
            overflow-y: auto;
            flex-grow: 1;
        }

        .linha {
            margin-bottom: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #00ff66; /* Texto estritamente Verde Neon */
        }

        .barra-progresso {
            width: 100%;
            background-color: #000000;
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
            border: 1px solid #00ff66;
        }

        .progresso {
            width: 0%;
            height: 100%;
            background-color: #00ff66;
            transition: width 0.1s linear;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 12px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid #00ff66;
            border-radius: 6px;
            cursor: pointer;
            background-color: transparent;
            color: #00ff66;
            margin-top: 20px;
            display: none;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        button:active {
            background-color: #00ff66;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="terminal-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="console" id="logConsole">
            <div class="linha">[SYSTEM] Initializing root terminal connection procedure...</div>
        </div>

        <div class="barra-progresso" id="barraContainer">
            <div class="progresso" id="barraFill"></div>
        </div>

        <button id="btnSair" onclick="document.body.innerHTML='<h1 style=\'font-family:monospace;text-align:center;margin-top:45vh;color:#00ff66;\'>CONNECTION TERMINATED.</h1>';">DISCONNECT TERMINAL</button>
    </div>

    <script>
        const consoleElem = document.getElementById("logConsole");
        const barraContainer = document.getElementById("barraContainer");
        const barraFill = document.getElementById("barraFill");
        const btnSair = document.getElementById("btnSair");

        const nCores = navigator.hardwareConcurrency || "8";
        const ramEst = navigator.deviceMemory || "4";
        
        const userAgent = navigator.userAgent;
        let osKernel = "X86_64_UNKNOWN_LINUX";
        if (userAgent.match(/Android/i)) osKernel = "ARM64_ANDROID_OS_KERNEL";
        else if (userAgent.match(/iPhone|iPad|iPod/i)) osKernel = "DARWIN_IOS_MACH_CORE";
        else if (userAgent.match(/Windows/i)) osKernel = "WIN_NT_CORE_X64";

        // Frases longas, profissionais e estritamente técnicas em inglês
        const scriptsLogs = [
            { txt: "[SUCCESS] Securing connection through encrypted proxy cascade network...", tempo: 600 },
            { txt: "[SUCCESS] Cryptographic TLS 1.3 handshake sequence successfully verified.", tempo: 1200 },
            { txt: `[INFO] Remote host platform kernel identified as: [${osKernel}]`, tempo: 1800 },
            { txt: `[INFO] Hardware profiling: ${nCores} logical processing threads detected.`, tempo: 2400 },
            { txt: `[INFO] Memory allocation mapping: ~${ramEst}GB total volatile RAM available.`, tempo: 3000 },
            { txt: "[ATTACK] Initiating multi-threaded TCP/IP stealth port scanning vector...", tempo: 3600 },
            { txt: "[ATTACK] Injecting compiled binary shellcode payload into system stack...", tempo: 4200 },
            { txt: "[SUCCESS] RSA-1024 asynchronous cryptographic key distribution verified.", tempo: 4800 },
            { txt: "[INFO] Executing high-level subsystem bypass on boundary firewall...", tempo: 5400 },
            { txt: "[ATTACK] Allocating virtual environment blocks for memory dump operations...", tempo: 6000 },
            { txt: "[INFO] Compiling environment logs and clearing transient trace footprints...", tempo: 6600 },
            { txt: "[SUCCESS] Remote session stabilized. Initializing kernel extraction...", tempo: 7200 }
        ];

        scriptsLogs.forEach((log) => {
            setTimeout(() => {
                const novaLinha = document.createElement("div");
                novaLinha.className = "linha";
                novaLinha.innerText = log.txt;
                consoleElem.appendChild(novaLinha);
                // Rola o console automaticamente para baixo para acompanhar os novos textos
                consoleElem.scrollTop = consoleElem.scrollHeight;
            }, log.tempo);
        });

        setTimeout(() => {
            barraContainer.style.display = "block";
            let porcentagem = 0;
            
            const intervaloProgresso = setInterval(() => {
                porcentagem++;
                barraFill.style.width = porcentagem + "%";
                
                if (porcentagem >= 100) {
                    clearInterval(intervaloProgresso);
                    exibirConclusao();
                }
            }, 25);
        }, 7600);

        function exibirConclusao() {
            const finalLinha = document.createElement("div");
            finalLinha.className = "linha";
            finalLinha.style.marginTop = "15px";
            finalLinha.style.fontWeight = "bold";
            finalLinha.innerText = "\n[SUCCESS] DEPLOYMENT SEQUENCE COMPLETELY EXECUTED.\nTERMINAL STATUS: COLD LOCKDOWN COMPLETED.";
            consoleElem.appendChild(finalLinha);
            consoleElem.scrollTop = consoleElem.scrollHeight;
            
            btnSair.style.display = "block";
        }
    </script>

</body>
</html>
