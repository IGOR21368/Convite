<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Mobile Racer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Container Principal do Jogo */
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background-color: #115511; /* Grama externa */
            position: relative;
            overflow: hidden;
            border: 4px solid #444;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* Placar Superior */
        #hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            text-align: center;
            z-index: 10;
            border: 2px solid #ffcc00;
            width: 80%;
        }
        .hud-val { color: #ffcc00; }

        /* Canvas da Estrada e Muros */
        #road-canvas {
            display: block;
            width: 100%;
            height: 60%; /* Ocupa a parte superior */
            background-color: #333;
        }

        /* PAINEL DE CONTROLES VIRTUAIS (Inferior) */
        #control-panel {
            width: 100%;
            height: 40%; /* Ocupa a parte de baixo */
            background: linear-gradient(to bottom, #2c3e50, #1a252f);
            border-top: 6px solid #ffcc00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Botão do Pedal (Acelerar) - Esquerda */
        #pedal-btn {
            width: 90px;
            height: 130px;
            background: linear-gradient(to bottom, #555, #222);
            border: 4px solid #888;
            border-radius: 15px 15px 5px 5px;
            box-shadow: 0 8px 0 #111, 0 10px 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffcc00;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px #000;
        }
        #pedal-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #111;
            background: linear-gradient(to bottom, #333, #111);
        }

        /* Botões de Seta (Direção) - Direita */
        .arrow-btn {
            width: 85px;
            height: 85px;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 6px 0 #7f2d21, 0 8px 10px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 32px;
        }
        .arrow-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7f2d21;
            background: linear-gradient(to bottom, #c0392b, #962d22);
        }

        /* Telas de Menu Overlay */
        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }
        #screen-overlay h1 {
            color: #ffcc00;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px #000;
        }
        #start-btn {
            font-size: 18px;
            background: #2ecc71;
            color: #fff;
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #27ae60;
            text-transform: uppercase;
        }
        #start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #27ae60;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- HUD Superior -->
        <div id="hud">
            DISTÂNCIA: <span id="distance-val" class="hud-val">0m</span> | 
            VEL: <span id="speed-val" class="hud-val">0 km/h</span>
        </div>

        <!-- Tela de Renderização Gráfica -->
        <canvas id="road-canvas"></canvas>

        <!-- Menu Inicial Físico -->
        <div id="screen-overlay">
            <h1 id="menu-title">RETRO RACER</h1>
            <button id="start-btn" onclick="startGame()">TOQUE PARA INICIAR</button>
        </div>

        <!-- Painel de Controles Físicos do Mobile -->
        <div id="control-panel">
            <!-- Esquerda: Pedal de Aceleração -->
            <div class="control-group">
                <div id="pedal-btn">PEDAL</div>
            </div>
            
            <!-- Direita: Setas de Curva -->
            <div class="control-group">
                <div id="left-btn" class="arrow-btn">◀</div>
                <div id="right-btn" class="arrow-btn">▶</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('road-canvas');
        const ctx = canvas.getContext('2d');
        
        const overlay = document.getElementById('screen-overlay');
        const menuTitle = document.getElementById('menu-title');
        const startBtn = document.getElementById('start-btn');
        const distanceVal = document.getElementById('distance-val');
        const speedVal = document.getElementById('speed-val');

        // Referência dos Botões
        const pedalBtn = document.getElementById('pedal-btn');
        const leftBtn = document.getElementById('left-btn');
        const rightBtn = document.getElementById('right-btn');

        // Ajuste de Resolução Interna do Canvas
        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Estados e Variáveis do Jogo
        let isPlaying = false;
        let gameLoopInterval;
        let distance = 0;
        let speed = 0;
        let maxSpeed = 120;
        
        // Controles ativos
        let keys = { accelerating: false, left: false, right: false };

        // Parâmetros da Pista e do Carro
        let playerX = 0; // Posição lateral do carro (-1 esquerda total, 1 direita total)
        let trackPosition = 0; // Progresso na pista
        let currentCurve = 0; // Curvatura atual da estrada
        
        // Elementos de Cenário Embutidos
        let obstacles = [];
        let trackSegments = [];

        // Inicializa mapa de curvas e retas randômicas
        for(let i=0; i<500; i++) {
            let curve = 0;
            if (i > 30 && i < 100) curve = 0.5;   // Curva à direita
            if (i > 150 && i < 220) curve = -0.6; // Curva à esquerda
            if (i > 300 && i < 380) curve = 0.8;  // Curva acentuada direita
            trackSegments.push(curve);
        }

        // Eventos Touch nos Controles Virtuais (Essencial para não falhar no celular)
        pedalBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.accelerating = true; });
        pedalBtn.addEventListener('touchend', () => keys.accelerating = false);
        
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        leftBtn.addEventListener('touchend', () => keys.left = false);
        
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        rightBtn.addEventListener('touchend', () => keys.right = false);

        // Suporte para testes rápidos no computador (Teclado)
        document.addEventListener('keydown', (e) => {
            if(e.code === 'ArrowUp' || e.code === 'KeyW') keys.accelerating = true;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowUp' || e.code === 'KeyW') keys.accelerating = false;
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        function startGame() {
            isPlaying = true;
            distance = 0;
            speed = 0;
            playerX = 0;
            trackPosition = 0;
            obstacles = [
                { pos: 50, x: -0.3 },
                { pos: 120, x: 0.4 },
                { pos: 200, x: -0.5 },
                { pos: 280, x: 0.2 },
                { pos: 360, x: -0.2 },
                { pos: 440, x: 0.5 }
            ];
