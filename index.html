<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Mobile Racer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #115511;
            position: relative;
            overflow: hidden;
            border: 4px solid #444;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 10px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            z-index: 30;
            border: 2px solid #ffcc00;
            width: 85%;
        }
        .hud-val { color: #ffcc00; }

        /* Área Visual da Pista */
        #screen-area {
            width: 100%;
            height: 60%;
            position: relative;
            background-color: #2c3e50;
            overflow: hidden;
        }

        /* Estrada Estilizada */
        #road {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100%;
            background-color: #444;
            border-left: 8px dashed #fff;
            border-right: 8px dashed #fff;
        }

        /* Efeito de movimento das faixas nas curvas */
        .road-moving {
            animation: moveRoad 0.5s linear infinite;
        }

        @keyframes moveRoad {
            0% { background-position-y: 0px; }
            100% { background-position-y: 40px; }
        }

        /* Carro do Jogador */
        #player-car {
            width: 40px;
            height: 65px;
            background-color: #ffcc00;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 6px;
            z-index: 10;
            box-shadow: inset 0 5px 0 #997a00, 0 4px 8px rgba(0,0,0,0.4);
            transition: left 0.05s linear;
        }
        #player-car::before {
            content: '';
            position: absolute;
            top: 12px; left: 4px; width: 32px; height: 15px;
            background: #222; border-radius: 4px;
        }

        /* Obstáculo */
        #obstacle {
            width: 35px;
            height: 35px;
            background-color: #e74c3c;
            border: 4px solid #fff;
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9;
            display: none;
        }

        /* Painel de Controles */
        #control-panel {
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, #2c3e50, #1a252f);
            border-top: 6px solid #ffcc00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 25;
        }

        #pedal-btn {
            width: 90px;
            height: 130px;
            background: linear-gradient(to bottom, #555, #222);
            border: 4px solid #888;
            border-radius: 15px 15px 5px 5px;
            box-shadow: 0 6px 0 #111;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffcc00;
            font-size: 14px;
            font-weight: bold;
        }

        .arrow-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 5px 0 #7f2d21;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
        }

        /* Menus */
        #screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 40;
        }
        #screen-overlay h1 {
            color: #ffcc00;
            font-size: 32px;
            margin-bottom: 20px;
        }
        #start-btn {
            font-size: 18px;
            background: #2ecc71;
            color: #fff;
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 0 #27ae60;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            PONTOS: <span id="score-val" class="hud-val">0</span> | 
            VEL: <span id="speed-val" class="hud-val">0 km/h</span>
        </div>

        <div id="screen-area">
            <div id="road"></div>
            <div id="player-car"></div>
            <div id="obstacle"></div>

            <div id="screen-overlay">
                <h1 id="menu-title">RETRO RACER</h1>
                <button id="start-btn" onclick="startGameDirect()">TOQUE PARA INICIAR</button>
            </div>
        </div>

        <div id="control-panel">
            <div>
                <button id="pedal-btn">PEDAL</button>
            </div>
            <div style="display: flex; gap: 15px;">
                <button id="left-btn" class="arrow-btn">◀</button>
                <button id="right-btn" class="arrow-btn">▶</button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('screen-overlay');
        const menuTitle = document.getElementById('menu-title');
        const startBtn = document.getElementById('start-btn');
        const scoreVal = document.getElementById('score-val');
        const speedVal = document.getElementById('speed-val');
        
        const car = document.getElementById('player-car');
        const obstacle = document.getElementById('obstacle');
        const road = document.getElementById('road');

        const pedal = document.getElementById('pedal-btn');
        const btnLeft = document.getElementById('left-btn');
        const btnRight = document.getElementById('right-btn');

        let isPlaying = false;
        let loopInterval;
        let score = 0;
        let speed = 0;
        let carPos = 50; // Em porcentagem (50% = centro)
        let obstacleY = -50;
        let obstacleX = 50;
        
        let isAccelerating = false;
        let isMovingLeft = false;
        let isMovingRight = false;

        // Comandos de Toque Mobile Diretos
        pedal.addEventListener('touchstart', (e) => { e.preventDefault(); isAccelerating = true; });
        pedal.addEventListener('touchend', () => isAccelerating = false);
        
        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingLeft = true; });
        btnLeft.addEventListener('touchend', () => isMovingLeft = false);
        
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingRight = true; });
        btnRight.addEventListener('touchend', () => isMovingRight = false);

        function startGameDirect() {
            isPlaying = true;
            score = 0;
            speed = 0;
            carPos = 50;
            obstacleY = -50;
            
            car.style.left = '50%';
            obstacle.style.display = 'block';
            overlay.style.display = 'none';
            
            clearInterval(loopInterval);
            loopInterval = setInterval(gameEngine, 20);
        }

        function gameEngine() {
            if (!isPlaying) return;

            // Aceleração
            if (isAccelerating) {
                if (speed < 160) speed += 2;
                score += 1;
            } else {
                if (speed > 0) speed -= 3;
            }

            // Movimento Lateral
            if (speed > 10) {
                if (isMovingLeft && carPos > 30) carPos -= 1.5;
                if (isMovingRight && carPos < 70) carPos += 1.5;
            }
            car.style.left = carPos + '%';

            scoreVal.innerText = score;
            speedVal.innerText = speed + " km/h";

            // Movimento do Obstáculo baseado na velocidade
            if (speed > 0) {
                obstacleY += (speed * 0.06);
            }

            // Reseta obstáculo se sair por baixo
            if (obstacleY > 450) {
                obstacleY = -50;
                obstacleX = 35 + Math.random() * 30; // Gera posição aleatória na pista
                obstacle.style.left = obstacleX + '%';
            }
            obstacle.style.top = obstacleY + 'px';

            // Verificação Simplificada de Colisão
            if (obstacleY > 300 && obstacleY < 370) {
                if (Math.abs(carPos - obstacleX) < 8) {
                    endGame();
                }
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(loopInterval);
            menuTitle.innerText = "FIM DE JOGO!";
            startBtn.innerText = "TENTAR DE NOVO";
            overlay.style.display = 'flex';
            obstacle.style.display = 'none';
        }
